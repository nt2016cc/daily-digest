name: Daily Tech Digest

on:
  schedule:
    # UTC+8 9:00 = UTC 1:00, every day (primary)
    - cron: "0 1 * * *"
    # Fallback 1: +30 min if primary missed
    - cron: "30 1 * * *"
    # Fallback 2: +60 min as last resort
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      preview:
        description: 'Preview mode — print only, no QQ send'
        type: boolean
        default: true

# Prevent duplicate runs stacking up
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # RSSHub as a service container for localhost:1200 routes
    services:
      rsshub:
        image: diygod/rsshub:latest
        ports:
          - 1200:1200
        env:
          # Allow all routes
          DISALLOW_ROBOT: false
        options: >-
          --health-cmd "curl -f http://localhost:1200/ || exit 1"
          --health-start-period 30s
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Wait for RSSHub
        run: |
          for i in $(seq 1 30); do
            if curl -sSf http://localhost:1200/ > /dev/null 2>&1; then
              echo "RSSHub ready"
              exit 0
            fi
            echo "Waiting for RSSHub... ($i/30)"
            sleep 2
          done
          echo "WARNING: RSSHub not ready — continuing without it"

      - name: Run digest
        env:
          QQ_APP_ID: ${{ secrets.QQ_APP_ID }}
          QQ_CLIENT_SECRET: ${{ secrets.QQ_CLIENT_SECRET }}
          QQ_OPENID: ${{ secrets.QQ_OPENID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [[ "${{ github.event.inputs.preview }}" == "true" ]]; then
            python digest.py --preview
          else
            python digest.py
          fi
