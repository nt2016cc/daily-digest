name: Daily Tech Digest

on:
  schedule:
    # UTC+8 9:00 = UTC 1:00, every day (primary)
    - cron: "0 1 * * *"
    # Fallback 1: +30 min if primary missed
    - cron: "30 1 * * *"
    # Fallback 2: +60 min as last resort
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      preview:
        description: 'Preview mode — print only, no QQ send'
        type: boolean
        default: true

# Prevent duplicate runs stacking up
concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run digest
        env:
          QQ_APP_ID: ${{ secrets.QQ_APP_ID }}
          QQ_CLIENT_SECRET: ${{ secrets.QQ_CLIENT_SECRET }}
          QQ_OPENID: ${{ secrets.QQ_OPENID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          if [[ "${{ github.event.inputs.preview }}" == "true" ]]; then
            python digest.py --preview
          else
            python digest.py
          fi
